services:

  # ─── PostgreSQL / PostGIS ────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       antennes_mahdia
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sig_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d antennes_mahdia"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s

  # ─── API Flask (Gunicorn production) ────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: flask_api
    restart: unless-stopped
    ports:
      - "7000:5000"
    environment:
      DATABASE_URL:     postgresql://postgres:1234@postgres:5432/antennes_mahdia
      FLASK_SECRET_KEY: pfe-geo-telecom-secret-2026
      FLASK_ENV:        production
      AUTH_USER_ADMIN:  admin
      AUTH_PASS_ADMIN:  admin123
      AUTH_USER_MOD:    moderateur
      AUTH_PASS_MOD:    mod123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sig_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout:  8s
      retries:  5
      start_period: 40s

  # ─── Simulation temps réel ────────────────────────────────────
  simulation:
    build: ./simulation
    container_name: simulation
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/antennes_mahdia
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sig_net

  # ─── Frontend React (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: react_app
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - sig_net

  # ─── GeoServer ───────────────────────────────────────────────
  geoserver:
    image: docker.osgeo.org/geoserver:2.25.2
    container_name: geoserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GEOSERVER_DATA_DIR: /opt/geoserver_data
      SKIP_DEMO_DATA:     "true"
      POSTGRES_HOST:      postgres
      POSTGRES_PORT:      "5432"
      POSTGRES_DB:        antennes_mahdia
      POSTGRES_USER:      postgres
      POSTGRES_PASSWORD:  "1234"
    volumes:
      - geoserver_data:/opt/geoserver_data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sig_net

  # ─── GeoNetwork ──────────────────────────────────────────────
  geonetwork:
    image: geonetwork:3.12.12
    container_name: geonetwork
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DATA_DIR: /catalogue-data
    volumes:
      - geonetwork_data:/catalogue-data
    networks:
      - sig_net

# ─── Volumes persistants ──────────────────────────────────────
volumes:
  postgres_data:
  geoserver_data:
  geonetwork_data:

# ─── Réseau interne isolé ─────────────────────────────────────
networks:
  sig_net:
    driver: bridge

